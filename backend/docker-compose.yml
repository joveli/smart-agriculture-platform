version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: smart_agri_postgres
    environment:
      POSTGRES_USER: smartagri
      POSTGRES_PASSWORD: smartagri_secret
      POSTGRES_DB: smart_agriculture
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartagri"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smart_agri_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: smart_agri_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: smartagri
      RABBITMQ_DEFAULT_PASS: smartagri_secret
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
